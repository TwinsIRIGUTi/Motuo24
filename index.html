<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>モツオ２４</title>
    <style>
        :root { --bg: #000814; --tile: #fffdeb; --accent: #ffeb3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: white; font-family: 'Hiragino Sans', sans-serif; 
            margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center;
        }
        
        #ui-layer { width: 100%; max-width: 500px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        #score-box { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        #timer-box { font-size: 1.2rem; font-family: monospace; }

        #stage { 
            width: 92vw; height: 92vw; max-width: 400px; max-height: 400px;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
            background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px;
        }
        .tile { 
            background: var(--tile); color: #222; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; border-radius: 6px; box-shadow: 0 3px 0 #d4ccb0;
            transition: transform 0.1s, opacity 0.2s;
        }
        .tile.empty { opacity: 0; pointer-events: none; }
        
        .clear-flash { animation: flash-white 0.3s ease-out forwards; z-index: 10; }
        @keyframes flash-white {
            0% { background: #fff; transform: scale(1); box-shadow: 0 0 20px #fff; }
            100% { background: var(--accent); transform: scale(0.8); opacity: 0; }
        }

        .rainbow { 
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
            background-size: 200%; animation: rb 1s linear infinite; color: white !important; 
        }
        @keyframes rb { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }

        #word-ticker-container {
            width: 100%; overflow: hidden; background: rgba(255,255,255,0.1);
            margin: 10px 0; white-space: nowrap; padding: 6px 0;
        }
        #word-ticker { display: inline-block; animation: ticker 40s linear infinite; font-size: 0.9rem; color: var(--accent); }
        @keyframes ticker { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        .controls { margin-top: 5px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 25px; font-weight: bold; background: #333; color: white; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,8,20,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .logo { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin-bottom: 25px; }
        .menu-btn { width: 220px; padding: 15px; margin: 8px; border-radius: 30px; background: var(--accent); color: #000; font-weight: bold; border:none; font-size: 1.1rem; }
        .rank-box { margin-top: 20px; width: 260px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 0.9rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-box">SCORE: 0</div>
        <div id="timer-box">03:00</div>
    </div>

    <div id="stage"></div>

    <div id="word-ticker-container">
        <div id="word-ticker">
            【得点単語】 シロ ・ レバ ・ ガツ ・ ハツ ・ ツル ・ ホネ ・ アブラ ・ ニコミ ・ シンキ ・ カシラ ・ ビール ・ サイダー ・ タンナマ ・ オシンコ ・ ダイコン ・ ツインズ(虹) ・ 各種(シオ/タレ/ミソ/スヤキ) 
        </div>
    </div>

    <div class="controls">
        <button id="btn-pause">一時停止</button>
        <button id="btn-exit-play" style="background:#8b0000">終了</button>
    </div>

    <div id="screen-title" class="overlay">
        <div class="logo">モツオ２４</div>
        <button class="menu-btn" onclick="game.start('3min')">3分モード開始</button>
        <button class="menu-btn" onclick="game.start('5min')">5分モード開始</button>
        <div class="rank-box">
            <div style="text-align:center; border-bottom:1px solid #444; margin-bottom:8px">🏆 HIGH SCORES</div>
            <div id="rank-list"></div>
        </div>
    </div>

    <div id="screen-result" class="overlay hidden">
        <h2 id="result-title" style="color:var(--accent)">RESULT</h2>
        <div id="result-score" style="font-size: 4rem; font-weight: bold; margin: 10px 0;">0</div>
        <p id="deadlock-msg" class="hidden" style="color:#ff5252; font-weight:bold;">手詰まりです！</p>
        <button class="menu-btn" onclick="location.reload()">タイトルへ</button>
    </div>

<script>
const WEIGHTED_LETTERS = ("シレハガツバラ".repeat(5) + "アイオカキサシスソタナニノホマミヤリルレワン".repeat(2) + "ウドゲゴザジズゼゾダデドバビブベボパピプペポ").split("");
const WORDS = ["シロシオ","シロタレ","シロミソ","シロスヤキ","シロナマ","シロ","レバシオ","レバタレ","レバミソ","レバスヤキ","レバボイル","レバ","ガツシオ","ガツタレ","ガツミソ","ガツスヤキ","ガツナマ","ガツ","アブラシオ","アブラタレ","アブラミソ","アブラナマ","アブラ","ハツシオ","ハツタレ","ハツミソ","ハツスヤキ","ハツナマ","ハツ","カシラシオ","カシラタレ","カシラミソ","カシラ","ツルシオ","ツルスヤキ","ツルミソ","ツルタレ","ツル","ビール","ウメワリ","ブドウワリ","ウイスキー","サイダー","シンキ","タンナマ","オシンコ","ダイコン","ニコミ","ホネ","ツインズ"].sort((a,b)=>b.length-a.length);

const game = {
    board: [], score: 0, timeLeft: 0, timer: null, isPaused: false,

    init() {
        this.renderRanking();
        document.getElementById('btn-pause').onclick = () => this.togglePause();
        document.getElementById('btn-exit-play').onclick = () => this.end();
        document.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});
    },

    getRandomLetter() { return WEIGHTED_LETTERS[Math.floor(Math.random() * WEIGHTED_LETTERS.length)]; },

    start(mode) {
        this.score = 0;
        this.isPaused = false;
        document.getElementById('screen-title').classList.add('hidden');
        this.timeLeft = (mode === '3min') ? 180 : 300;
        this.createBoard();
        this.startTimer();
    },

    createBoard() {
        let attempt = 0;
        do {
            let flat = [];
            for(let i=0; i<24; i++) flat.push(this.getRandomLetter());
            flat.push(""); flat.sort(() => Math.random() - 0.5);
            this.board = [];
            for(let i=0; i<5; i++) this.board.push(flat.slice(i*5, i*5+5));
            attempt++;
        } while (!this.canMakeAnyWord() && attempt < 100); // 詰んでいない配置になるまで生成
        this.draw();
    },

    draw() {
        const stage = document.getElementById('stage');
        stage.innerHTML = '';
        this.board.forEach((row, y) => {
            row.forEach((char, x) => {
                const el = document.createElement('div');
                el.id = `tile-${x}-${y}`;
                el.className = 'tile' + (char === "" ? " empty" : "");
                if (char === "ツインズ") el.classList.add('rainbow');
                el.textContent = char;
                el.onclick = () => this.handleMove(x, y);
                el.ontouchstart = (e) => { e.preventDefault(); this.handleMove(x, y); };
                stage.appendChild(el);
            });
        });
        document.getElementById('score-box').textContent = `SCORE: ${this.score}`;
    },

    handleMove(x, y) {
        if (this.isPaused) return;
        let ex, ey;
        this.board.forEach((row, r) => row.forEach((c, col) => { if(c === "") { ex=col; ey=r; } }));
        if (x === ex || y === ey) {
            if (x === ex) {
                const dir = y < ey ? 1 : -1;
                for (let i = ey; i !== y; i -= dir) this.board[i][x] = this.board[i-dir][x];
            } else {
                const dir = x < ex ? 1 : -1;
                for (let i = ex; i !== x; i -= dir) this.board[y][i] = this.board[y][i-dir];
            }
            this.board[y][x] = "";
            this.draw();
            this.check().then(() => {
                if (!this.canMakeAnyWord()) this.end(true); // 動かした後に手詰まり判定
            });
        }
    },

    async check(isInitial = false) {
        let found = false;
        const pts = {2:10, 3:50, 4:150, 5:300};
        let clearSet = new Set(), used = new Set();

        const scan = (str, coords) => {
            WORDS.forEach(w => {
                let idx = str.indexOf(w);
                if (idx !== -1) {
                    let overlap = false;
                    for(let i=0; i<w.length; i++) if(used.has(coords[idx+i])) overlap = true;
                    if(!overlap) {
                        for(let i=0; i<w.length; i++) { clearSet.add(coords[idx+i]); used.add(coords[idx+i]); }
                        if(!isInitial) this.score += pts[w.length] || 300;
                        found = true;
                    }
                }
            });
        };

        for(let r=0; r<5; r++) scan(this.board[r].map(c=>c||" ").join(""), [0,1,2,3,4].map(c=>`${c},${r}`));
        for(let c=0; c<5; c++) {
            let colStr = "", colCoords = [];
            for(let r=0; r<5; r++) { colStr += (this.board[r][c] || " "); colCoords.push(`${c},${r}`); }
            scan(colStr, colCoords);
        }

        if(found) {
            clearSet.forEach(pos => {
                const [cx, cy] = pos.split(',').map(Number);
                const el = document.getElementById(`tile-${cx}-${cy}`);
                if(el) el.classList.add('clear-flash');
            });
            await new Promise(r => setTimeout(r, 300));
            clearSet.forEach(pos => {
                const [cx, cy] = pos.split(',').map(Number);
                this.board[cy][cx] = this.getRandomLetter();
            });
            this.draw();
            await this.check(isInitial);
        }
    },

    // 手詰まり判定ロジック
    canMakeAnyWord() {
        let ex, ey;
        this.board.forEach((row, r) => row.forEach((c, col) => { if(c === "") { ex=col; ey=r; } }));
        
        // 空きマスの縦横に移動可能なタイルをすべてシミュレート
        const moves = [];
        for(let x=0; x<5; x++) if(x !== ex) moves.push({x, y:ey});
        for(let y=0; y<5; y++) if(y !== ey) moves.push({x:ex, y});

        for(let move of moves) {
            let tempBoard = JSON.parse(JSON.stringify(this.board));
            let {x, y} = move;
            // シミュレーション移動
            if (x === ex) {
                const dir = y < ey ? 1 : -1;
                for (let i = ey; i !== y; i -= dir) tempBoard[i][x] = tempBoard[i-dir][x];
            } else {
                const dir = x < ex ? 1 : -1;
                for (let i = ex; i !== x; i -= dir) tempBoard[y][i] = tempBoard[y][i-dir];
            }
            tempBoard[y][x] = "";

            // その状態で単語があるか
            for(let r=0; r<5; r++) {
                let s = tempBoard[r].map(c=>c||" ").join("");
                if(WORDS.some(w => s.includes(w))) return true;
            }
            for(let c=0; c<5; c++) {
                let s = "";
                for(let r=0; r<5; r++) s += (tempBoard[r][c] || " ");
                if(WORDS.some(w => s.includes(w))) return true;
            }
        }
        return false;
    },

    startTimer() {
        if(this.timer) clearInterval(this.timer);
        this.timer = setInterval(() => {
            if(this.isPaused) return;
            this.timeLeft--;
            let m = Math.floor(this.timeLeft/60), s = this.timeLeft%60;
            document.getElementById('timer-box').textContent = `${m}:${s<10?'0':''}${s}`;
            if(this.timeLeft <= 0) this.end();
        }, 1000);
    },

    togglePause() {
        this.isPaused = !this.isPaused;
        document.getElementById('btn-pause').textContent = this.isPaused ? "再開" : "一時停止";
    },

    end(isDeadlock = false) {
        clearInterval(this.timer);
        this.saveScore();
        if(isDeadlock) document.getElementById('deadlock-msg').classList.remove('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('result-score').textContent = this.score;
    },

    saveScore() {
        let list = JSON.parse(localStorage.getItem('motsuo_rank') || "[]");
        list.push({s: this.score, d: new Date().toLocaleDateString()});
        list.sort((a,b) => b.s - a.s);
        localStorage.setItem('motsuo_rank', JSON.stringify(list.slice(0,5)));
    },

    renderRanking() {
        let list = JSON.parse(localStorage.getItem('motsuo_rank') || "[]");
        document.getElementById('rank-list').innerHTML = list.map((item, i) => 
            `<div style="display:flex; justify-content:space-between"><span>${i+1}位: ${item.s}点</span><small>${item.d}</small></div>`
        ).join('') || "記録なし";
    }
};

game.init();
</script>
</body>
</html>
